# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'telegram-forwarder-userbot'
primary_region = 'ams'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'

[[restart]]
  policy = "on-failure"
  retries = 5

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
